
x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@postgres:5432/airflow"
    AIRFLOW__WEBSERVER__SECRET_KEY: "changeme-in-production"
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MINIO_BUCKET: ecommerce-data-lake
    DATABASE_URL: "postgresql://ecommerce:ecommerce_secret@postgres:5432/ecommerce_dw"
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_DB: ecommerce_dw
    POSTGRES_USER: ecommerce
    POSTGRES_PASSWORD: ecommerce_secret
    SPARK_MASTER_URL: "spark://spark-master:7077"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt_models:/opt/airflow/dbt_models
    - .:/opt/airflow/app
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_JMX_PORT: 9101
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Schema Registry ────────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092

  # ── Kafka UI ───────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ecommerce
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce_secret
      POSTGRES_DB: ecommerce_dw
      POSTGRES_MULTIPLE_DATABASES: "ecommerce_dw,airflow"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce_dw"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible data lake) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO bucket initialiser ───────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing myminio/ecommerce-data-lake;
        mc anonymous set download myminio/ecommerce-data-lake;
        exit 0;
      "

  # ── Spark Master ───────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    user: root
    command: ["/opt/spark/sbin/start-master.sh"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8080"
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - spark_logs:/opt/spark/logs

  # ── Spark Worker ───────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    user: root
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
      SPARK_WORKER_WEBUI_PORT: "8081"
    depends_on:
      - spark-master
    volumes:
      - spark_logs:/opt/spark/logs

  # ── Airflow Init ───────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: >
      bash -c "
        airflow db upgrade &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    restart: "no"

  # ── Airflow Webserver ──────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8083:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ─────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Data Ingestion (producer) ──────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: docker/Dockerfile.ingestion
    container_name: ingestion
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NUM_USERS: "1000"
      NUM_PRODUCTS: "500"
      EVENTS_PER_SECOND: "10"
      GENERATOR_RUNTIME_SECONDS: "0"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Spark Streaming ────────────────────────────────────────────────────
  streaming:
    build:
      context: .
      dockerfile: docker/Dockerfile.streaming
    container_name: streaming
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ecommerce-data-lake
      SPARK_MASTER_URL: local[*]
    depends_on:
      kafka:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── FastAPI ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: api
    environment:
      DATABASE_URL: "postgresql://ecommerce:ecommerce_secret@postgres:5432/ecommerce_dw"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Streamlit Dashboard ────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: dashboard
    environment:
      API_BASE_URL: http://api:8000/api/v1
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped


volumes:
  postgres_data:
  minio_data:
  spark_logs:

networks:
  default:
    name: ecommerce-platform
    driver: bridge
